name: Download Unit Data

on:
  workflow_dispatch:
    inputs:
      client-name:
        description: Client Name
        required: true

      persona:
        description: Persona
        required: true

      table-name:
        description: SQL Table Name
        required: true

      status-column:
        description: Status Column
        required: false
        default: status

      output-file:
        description: Output Excel File
        required: false
        default: output.xlsx

      storage-account:
        description: Storage Account
        required: true

      filesystem:
        description: ADLS Container
        required: true

jobs:
  generate_excel:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Microsoft ODBC Driver 18
        run: |
          sudo mkdir -p /etc/apt/keyrings
          curl -fsSL https://packages.microsoft.com/keys/microsoft.asc | sudo gpg --batch --yes --dearmor -o /etc/apt/keyrings/microsoft.gpg
          echo "deb [arch=amd64 signed-by=/etc/apt/keyrings/microsoft.gpg] https://packages.microsoft.com/ubuntu/22.04/prod jammy main" | sudo tee /etc/apt/sources.list.d/mssql-release.list
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y msodbcsql18 unixodbc-dev

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Execute Script
        run: |
          python scripts/download_unit_data.py \
            --client-name "${{ github.event.inputs.client-name }}" \
            --persona "${{ github.event.inputs.persona }}" \
            --table-name "${{ github.event.inputs.table-name }}" \
            --status-column "${{ github.event.inputs.status-column }}" \
            --output-file "${{ github.event.inputs.output-file }}" \
            --storage-account "${{ github.event.inputs.storage-account }}" \
            --filesystem "${{ github.event.inputs.filesystem }}"

      - name: Verify Excel File
        run: |
          pwd
          ls -la
          find . -name "*.xlsx"

      - name: Upload Excel Artifact
        uses: actions/upload-artifact@v4
        with:
          name: UnitData
          path: ${{ github.event.inputs.output-file }}